# Sandbox compose override — applied ON TOP of the repo root docker-compose.yml.
#
# Usage on the VPS:
#   docker compose \
#     -f /opt/metasift/docker-compose.yml \
#     -f /opt/metasift/deploy/sandbox/docker-compose.sandbox.yml \
#     up -d
#
# The systemd unit `metasift-om.service` already wires this; only invoke
# directly for one-off troubleshooting.
#
# What this file changes vs. the dev compose:
#
#   1. OpenMetadata server's :8585 / :8586 ports are bound to the loopback
#      address (127.0.0.1) instead of the wildcard. On a public VPS the dev
#      compose's `"8585:8585"` would expose OM admin to the internet —
#      a major security gap that SANDBOX_DEPLOYMENT_PLAN.md §2 explicitly
#      forbids. Caddy fronts everything on 443; OM is reachable only via
#      SSH tunnel (`ssh -L 8585:127.0.0.1:8585 vps`).
#
#      CRITICAL: the `ports: !override` YAML tag is load-bearing. Compose
#      merges `ports:` sequences ADDITIVELY by default — without !override
#      the final merged config has BOTH `"8585:8585"` (from base) AND
#      `"127.0.0.1:8585:8585"` (from this file), and the public binding
#      wins. UFW doesn't help (Docker manipulates the DOCKER iptables
#      chain in front of the filter table that ufw owns). Always
#      `make sandbox-config | grep -A4 'openmetadata-server'` after
#      editing this file to verify ONLY the loopback binding survives.
#
#   2. Smaller Elasticsearch heap (768 MB vs. 1 GB). Risk-mitigation per
#      SANDBOX_PHASES.md §"Risks" #1 — the KVM2 has 8 GB RAM total and the
#      OM stack pushes ~6 GB on its own; trimming ES heap leaves room for
#      FastAPI + Caddy + system without leaning on swap during seed. The
#      base's other env vars (discovery.type, xpack.security) are already
#      correct, no override needed for them. ES_JAVA_OPTS appears in both
#      base and override; Compose merges environment maps with last-write-
#      wins per key so the override's value cleanly replaces the base's.
#
# Local-dev compose (`docker-compose.yml`) is unchanged — it still binds OM
# to 0.0.0.0 so `localhost:8585` works for the developer. This override is
# additive and only loaded on the VPS.

services:
  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms768m -Xmx768m

  openmetadata-server:
    ports: !override
      - "127.0.0.1:8585:8585"
      - "127.0.0.1:8586:8586"
